<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256" role="img" aria-label="NexCart favicon">
  <title>NexCart</title>
  <defs>

    <!-- White background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <!-- Chrome metallic gradient for cart -->
    <linearGradient id="cg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#e8e8e8"/>
      <stop offset="55%"  stop-color="#a8a8a8"/>
      <stop offset="85%"  stop-color="#505050"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>

    <!-- Wheel gradient -->
    <linearGradient id="wg" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%"   stop-color="#e8e8e8"/>
      <stop offset="50%"  stop-color="#999999"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>

    <!-- Swoosh gradient -->
    <linearGradient id="sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#aaaaaa" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#cccccc" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#aaaaaa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#aaaaaa" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle inner highlight on bg -->
    <radialGradient id="innerGlow" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square -->
    <clipPath id="rndClip">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14"/>
    </clipPath>

    <!-- Clip basket body -->
    <clipPath id="bkt">
      <path d="M 8,19 L 42,19 L 40,43 L 10,43 Z"/>
    </clipPath>

  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#innerGlow)"/>

  <!-- All content clipped to rounded square -->
  <g clip-path="url(#rndClip)">

    <!-- Orbital swoosh (white line on black bg) -->
    <ellipse cx="27" cy="33" rx="26" ry="12"
             fill="none" stroke="url(#sw)" stroke-width="1.4" stroke-linecap="round"
             transform="rotate(-16 27 33)"/>

    <!-- Pixel dots (white on black) -->
    <g fill="#999999">
      <rect x="4"  y="5"  width="3" height="3" rx="0.6"/>
      <rect x="9"  y="5"  width="3" height="3" rx="0.6"/>
      <rect x="4"  y="10" width="3" height="3" rx="0.6"/>
      <rect x="9"  y="10" width="3" height="3" rx="0.6"/>
      <rect x="14" y="10" width="3" height="3" rx="0.6"/>
    </g>

    <!-- Shopping cart (black with white outlines) -->
    <g>

      <!-- Basket body -->
      <path d="M 8,19 L 42,19 L 40,43 L 10,43 Z"
            fill="url(#cg)"
            stroke="rgba(255,255,255,0.55)"
            stroke-width="1.3"
            stroke-linejoin="round"/>

      <!-- Basket ribs -->
      <g clip-path="url(#bkt)" stroke="rgba(0,0,0,0.45)" stroke-width="1">
        <line x1="6"  y1="27" x2="44" y2="27"/>
        <line x1="6"  y1="34" x2="43" y2="34"/>
      </g>

      <!-- Basket left sheen -->
      <path d="M 8,19 L 13,19 L 12,43 L 7,43 Z"
            fill="rgba(255,255,255,0.22)" clip-path="url(#bkt)"/>

      <!-- Handle arm -->
      <path d="M 42,19 C 48,19 50,12 53,12 L 56,12 L 56,19 C 53,19 51,26 46,26 L 40,26 Z"
            fill="url(#cg)"
            stroke="rgba(255,255,255,0.5)"
            stroke-width="1.1"/>
      <!-- Post sheen -->
      <rect x="55" y="12" width="2" height="18" rx="1" fill="rgba(255,255,255,0.3)"/>

      <!-- Axle bar -->
      <rect x="10" y="42" width="30" height="3" rx="1.5"
            fill="#3a3a3a"
            stroke="rgba(255,255,255,0.3)"
            stroke-width="0.8"/>

      <!-- Left wheel -->
      <circle cx="17" cy="52" r="7"   fill="url(#wg)" stroke="rgba(255,255,255,0.6)" stroke-width="1.4"/>
      <circle cx="17" cy="52" r="3.2" fill="#1a1a1a"/>
      <circle cx="17" cy="52" r="1.4" fill="#999999"/>

      <!-- Right wheel -->
      <circle cx="35" cy="52" r="7"   fill="url(#wg)" stroke="rgba(255,255,255,0.6)" stroke-width="1.4"/>
      <circle cx="35" cy="52" r="3.2" fill="#1a1a1a"/>
      <circle cx="35" cy="52" r="1.4" fill="#999999"/>

    </g>

  </g>

  <!-- Outer border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.4" ry="13.4"
        fill="none" stroke="#000000" stroke-width="3"/>

</svg>
