<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="1760" height="400" role="img" aria-label="NexCart logo">
  <title>NexCart</title>
  <defs>

    <!-- Chrome/metallic gradient for cart body -->
    <linearGradient id="chrome" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="18%"  stop-color="#ebebeb"/>
      <stop offset="50%"  stop-color="#a0a0a0"/>
      <stop offset="82%"  stop-color="#484848"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>

    <!-- Wheel gradient -->
    <linearGradient id="whl" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%"   stop-color="#f0f0f0"/>
      <stop offset="40%"  stop-color="#aaaaaa"/>
      <stop offset="100%" stop-color="#3c3c3c"/>
    </linearGradient>

    <!-- Swoosh outer gradient -->
    <linearGradient id="sw1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8c8c8" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#d0d0d0" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#b0b0b0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b0b0b0" stop-opacity="0"/>
    </linearGradient>

    <!-- Swoosh inner gradient -->
    <linearGradient id="sw2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#aaaaaa" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#bbbbbb" stop-opacity="0.75"/>
      <stop offset="75%"  stop-color="#999999" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#999999" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="sh" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#000000" flood-opacity="0.48"/>
    </filter>

    <!-- Softer shadow for swooshes -->
    <filter id="shs" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Clip: icon left region -->
    <clipPath id="icoClip">
      <rect x="-2" y="-2" width="230" height="204"/>
    </clipPath>

    <!-- Clip: basket interior only -->
    <clipPath id="bktClip">
      <path d="M 20,27 L 154,27 L 147,130 L 28,130 Z"/>
    </clipPath>

  </defs>

  <!-- PIXEL DOT GRID -->
  <g filter="url(#sh)">
    <g fill="#c2c2c2" stroke="white" stroke-width="1.2">
      <rect x="4"  y="12" width="11" height="11" rx="2.2"/>
      <rect x="19" y="12" width="11" height="11" rx="2.2"/>
      <rect x="4"  y="27" width="11" height="11" rx="2.2"/>
      <rect x="19" y="27" width="11" height="11" rx="2.2"/>
      <rect x="34" y="27" width="11" height="11" rx="2.2"/>
      <rect x="4"  y="42" width="11" height="11" rx="2.2"/>
      <rect x="19" y="42" width="11" height="11" rx="2.2"/>
      <rect x="34" y="42" width="11" height="11" rx="2.2"/>
    </g>
  </g>

  <!-- ORBITAL SWOOSH LINES -->
  <g clip-path="url(#icoClip)" filter="url(#shs)">
    <ellipse cx="107" cy="100" rx="112" ry="50"
             fill="none" stroke="url(#sw1)" stroke-width="3.8" stroke-linecap="round"
             transform="rotate(-15 107 100)"/>
    <ellipse cx="107" cy="100" rx="90" ry="36"
             fill="none" stroke="url(#sw2)" stroke-width="2.2" stroke-linecap="round"
             transform="rotate(-15 107 100)"/>
  </g>

  <!-- SHOPPING CART ICON -->
  <g filter="url(#sh)">

    <!-- Cart basket body -->
    <path d="M 20,27 L 154,27 L 147,130 L 28,130 Z"
          fill="url(#chrome)" stroke="white" stroke-width="3.2" stroke-linejoin="round"/>

    <!-- Basket ribs -->
    <g clip-path="url(#bktClip)" stroke="rgba(50,50,50,0.60)" stroke-width="2.2">
      <line x1="14" y1="60"  x2="160" y2="60"/>
      <line x1="14" y1="83"  x2="157" y2="83"/>
      <line x1="14" y1="106" x2="154" y2="106"/>
    </g>

    <!-- Left-edge specular highlight -->
    <path d="M 20,27 L 40,27 L 37,130 L 17,130 Z"
          fill="rgba(255,255,255,0.22)" clip-path="url(#bktClip)"/>

    <!-- Handle arm -->
    <path d="M 154,27 C 170,27 177,7 187,7 L 198,7 L 198,26 C 188,26 182,46 167,46 L 147,46 Z"
          fill="url(#chrome)" stroke="white" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- Handle grip post -->
    <rect x="191" y="4" width="18" height="66" rx="9"
          fill="url(#chrome)" stroke="white" stroke-width="2.8"/>
    <rect x="193" y="7" width="5" height="60" rx="2.5"
          fill="rgba(255,255,255,0.28)"/>

    <!-- Axle crossbar -->
    <rect x="28" y="127" width="119" height="9" rx="4.5"
          fill="#555555" stroke="white" stroke-width="1.8"/>

    <!-- Left wheel -->
    <circle cx="52"  cy="160" r="24" fill="url(#whl)" stroke="white" stroke-width="3.2"/>
    <circle cx="52"  cy="160" r="12" fill="#1e1e1e" stroke="#888888" stroke-width="1.6"/>
    <line x1="43" y1="160" x2="61" y2="160" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="52" y1="151" x2="52" y2="169" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="52"  cy="160" r="4.5" fill="#bbbbbb"/>

    <!-- Right wheel -->
    <circle cx="128" cy="160" r="24" fill="url(#whl)" stroke="white" stroke-width="3.2"/>
    <circle cx="128" cy="160" r="12" fill="#1e1e1e" stroke="#888888" stroke-width="1.6"/>
    <line x1="119" y1="160" x2="137" y2="160" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="128" y1="151" x2="128" y2="169" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="128" cy="160" r="4.5" fill="#bbbbbb"/>

  </g>

  <!-- NexCart FULL TEXT — viewBox now 880px wide, plenty of room -->
  <text
    x="232" y="158"
    font-family="'Arial Black', 'Franklin Gothic Heavy', 'Haettenschweiler', Impact, 'Arial Bold', sans-serif"
    font-size="104"
    font-weight="900"
    font-style="italic"
    letter-spacing="-1"
    fill="#181818"
    stroke="white"
    stroke-width="14"
    stroke-linejoin="round"
    paint-order="stroke fill"
    filter="url(#sh)"
  >NexCart</text>

</svg>
